<div class="pt-20 sm:pt-32 pb-10 sm:pb-20 bg-white min-h-screen relative overflow-hidden">
  <!-- Decorative background elements -->
  <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-red-700/10 rounded-full blur-[120px] -mr-64 -mt-64 animate-pulse"></div>
  <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-red-700/10 rounded-full blur-[120px] -ml-64 -mb-64 animate-pulse"></div>

  <div class="container mx-auto px-4 sm:px-6 relative z-10">
    <div class="max-w-4xl mx-auto">
      <!-- Header Area -->
      <div class="text-center mb-10 sm:mb-16 fade-in-up">
        <h2 class="text-red-700 font-black uppercase tracking-[0.6em] text-[10px] mb-4">Partner with Us</h2>
        <h1 class="text-3xl md:text-7xl font-black text-black leading-tight uppercase tracking-tighter italic">
          Become a <span class="text-shine"> Customer</span>
        </h1>
        <p class="text-gray-400 mt-4 sm:mt-6 text-base sm:text-lg max-w-2xl mx-auto font-medium">
          Unlock exclusive wholesale pricing and join Europe's leading foodservice network.
        </p>
      </div>

      <!-- Registration Steps -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 sm:gap-8 mb-8 sm:mb-10 fade-in-up delay-200">
        @for (step of steps; track step.title; let i = $index) {
          <div class="glass-card p-3 sm:p-4 rounded-[2rem] sm:rounded-[2.5rem] border border-black/5 relative group hover:-translate-y-2 transition-all duration-500">
            <div class="w-14 h-14 rounded-2xl bg-red-700/10 flex items-center justify-center text-red-700 font-black text-2xl mb-2 group-hover:bg-red-700 group-hover:text-white transition-all duration-500">
              {{i + 1}}
            </div>
            <h3 class="text-xl font-black text-white uppercase italic mb-1">{{step.title}}</h3>
            <p class="text-gray-500 text-sm leading-relaxed">{{step.description}}</p>
          </div>
        }
      </div>

      <!-- Form Container -->
      <div class="glass-card p-6 md:p-16 rounded-[2rem] sm:rounded-[4rem] border border-black/5 shadow-3xl relative overflow-hidden group fade-in-up delay-300">
        <!-- Floating neon accent -->
        <div class="absolute inset-0 neon-border opacity-10 pointer-events-none"></div>

        <div class="relative z-10">
          <form class="space-y-4 sm:space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-8">
              <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">First Name</label>
                <input type="text" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium placeholder:text-gray-700" placeholder="E.g. John">
              </div>
              <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">Last Name</label>
                <input type="text" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium placeholder:text-gray-700" placeholder="E.g. Doe">
              </div>
            </div>

            <div class="space-y-4">
              <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">Business Name</label>
              <input type="text" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium placeholder:text-gray-700" placeholder="Your Registered Business Name">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 sm:gap-8">
              <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">Email Address</label>
                <input type="email" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium placeholder:text-gray-700" placeholder="john@business.com">
              </div>
              <div class="space-y-4">
                <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">Phone Number</label>
                <input type="tel" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium placeholder:text-gray-700" placeholder="+44 700 000 000">
              </div>
            </div>

            <div class="space-y-4">
              <label class="block text-[10px] font-black uppercase tracking-widest text-gray-500 px-2">Business Type</label>
              <div class="relative">
                <select class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-5 text-white focus:outline-none focus:border-red-700 transition-all font-medium appearance-none">
                  <option value="restaurant">Restaurant</option>
                  <option value="retail">Retail Store</option>
                  <option value="catering">Catering Service</option>
                  <option value="other">Other</option>
                </select>
                <div class="absolute right-6 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
                  ▼
                </div>
              </div>
            </div>

            <div class="pt-10">
              <button class="w-full relative px-6 py-4 sm:px-12 sm:py-8 bg-red-700 text-white font-black uppercase tracking-widest rounded-2xl sm:rounded-3xl overflow-hidden transition-all hover:scale-[1.01] active:scale-[0.99] shadow-[0_25px_60px_rgba(186,18,18,0.4)] group">
                <span class="relative z-10 flex items-center justify-center gap-4 sm:gap-6 text-sm sm:text-base">
                  Submit Application
                  <span class="w-10 h-10 sm:w-12 sm:h-12 rounded-full bg-white/10 flex items-center justify-center group-hover:scale-110 transition-transform">→</span>
                </span>
                <div class="absolute inset-0 bg-white opacity-0 group-hover:opacity-10 transition-opacity"></div>
              </button>
              <p class="text-center text-[9px] font-black text-gray-600 uppercase tracking-widest mt-8">
                By submitting, you agree to our <a href="#" class="text-gray-400 hover:text-red-700">terms & conditions</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
