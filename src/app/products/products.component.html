<div class="pt-32 pb-20 bg-gray-50 min-h-screen">
  <div class="container mx-auto px-4 sm:px-6">
    <!-- Header Section -->
    <div class="mb-12">
      <h1 class="text-4xl md:text-6xl font-black text-gray-950 uppercase tracking-tighter mb-4">
        Our <span class="text-red-700">Categories</span>
      </h1>
      <p class="text-gray-500 font-medium max-w-2xl text-lg">
        Explore our comprehensive range of high-quality products across all foodservice sectors.
      </p>
    </div>

    <div class="flex flex-col lg:flex-row gap-12">
      <!-- Sidebar Filtering -->
      <aside class="w-full lg:w-72 space-y-8">
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
          <h4 class="text-xs font-black uppercase tracking-widest text-gray-400 mb-6">Quick Search</h4>
          <div class="relative">
            <input 
              type="text" 
              (input)="filterSearch($event)"
              placeholder="Search category..." 
              class="w-full bg-gray-50 border border-gray-100 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-red-700 transition-colors"
            >
          </div>
        </div>

        <div class="bg-gray-950 p-8 rounded-3xl text-white relative overflow-hidden group">
          <div class="relative z-10">
            <h4 class="text-xl font-black uppercase tracking-tighter mb-4">Global Network</h4>
            <p class="text-xs text-gray-400 leading-relaxed mb-6">
              Access over 5,000+ premium products delivered across Europe.
            </p>
            <button class="w-full py-3 bg-red-700 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white hover:text-red-700 transition-all">
              Become a Partner
            </button>
          </div>
          <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-red-700/20 rounded-full blur-3xl group-hover:bg-red-700/40 transition-all"></div>
        </div>
      </aside>

      <!-- Main Content Area (Categories Grid) -->
      <div class="flex-1">
        <div class="grid grid-cols-2 sm:grid-cols-2 xl:grid-cols-3 gap-4 sm:gap-6">
          @for (category of (categories$ | async); track category.name) {
          <a 
            [routerLink]="['/products', category.name]"
            class="group bg-white rounded-[1.5rem] sm:rounded-[2rem] overflow-hidden border border-gray-100 hover:shadow-2xl hover:shadow-red-700/5 hover:-translate-y-2 transition-all duration-500 flex flex-col h-full"
          >
            <div class="aspect-[4/3] bg-gray-50 p-6 sm:p-12 relative overflow-hidden">
              <img 
                [src]="category.image || 'assets/images/' + category.name.toLowerCase() + '.png'" 
                class="w-full h-full object-contain transition-transform duration-700 group-hover:scale-110" 
                onerror="this.src='assets/images/ICS_UK.png'; this.classList.add('opacity-10')"
                [alt]="category.name"
              >
              <div class="absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-t from-gray-50 to-transparent"></div>
            </div>
            
            <div class="p-4 sm:p-8 flex items-center justify-between">
              <div>
                <h3 class="text-xs sm:text-xl font-black text-gray-950 uppercase tracking-tight italic">{{category.name}}</h3>
                <span class="text-[9px] font-black text-red-700 uppercase tracking-widest mt-1 block">View Catalog →</span>
              </div>
              <div class="w-8 h-8 sm:w-12 sm:h-12 rounded-full bg-gray-50 flex items-center justify-center text-gray-300 group-hover:bg-red-700 group-hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7-7 7" />
                </svg>
              </div>
            </div>
          </a>
          }
        </div>
      </div>
    </div>
  </div>
</div>
